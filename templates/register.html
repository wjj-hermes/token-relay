{% extends "base.html" %}
{% block title %}{{ t("register_title") }} - Token Relay{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card">
            <div class="card-body">
                <h3 class="card-title text-center mb-4">{{ t("register_title") }}</h3>
                {% if error %}
                <div class="alert alert-danger">{{ error }}</div>
                {% endif %}
                <form method="post">
                    <div class="mb-3">
                        <label class="form-label">{{ t("username") }}</label>
                        <input type="text" name="username" class="form-control" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">{{ t("email") }}</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">{{ t("password") }}</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">{{ t("confirm_password") }}</label>
                        <input type="password" name="password2" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">{{ t("register_btn") }}</button>
                </form>
                <p class="text-center mt-3 mb-0">
                    <a href="/login">{{ t("has_account") }}</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
