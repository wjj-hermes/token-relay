version: "3.8"

services:
  token-relay:
    build: .
    container_name: token-relay
    restart: always
    ports:
      - "8888:8888"
    volumes:
      - ./data:/app/data
    environment:
      - JWT_SECRET=${JWT_SECRET:-change-me-to-a-long-random-string}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - DATABASE_URL=sqlite+aiosqlite:///./data/data.db
      # Alipay config (set these in .env file)
      - ALIPAY_APP_ID=${ALIPAY_APP_ID:-}
      - ALIPAY_PRIVATE_KEY=${ALIPAY_PRIVATE_KEY:-}
      - ALIPAY_PUBLIC_KEY=${ALIPAY_PUBLIC_KEY:-}
      - ALIPAY_NOTIFY_URL=${ALIPAY_NOTIFY_URL:-}
      - ALIPAY_SANDBOX=${ALIPAY_SANDBOX:-false}
